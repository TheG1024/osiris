# Render Blueprint for Osiris Redux
# Deploy at: https://render.com/select-repo

services:
  # Web Frontend (Next.js)
  - type: web
    name: osiris-web
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile.web
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://osiris-api.onrender.com
      - key: NODE_ENV
        value: production
    
  # API Gateway (Express + WebSocket)
  - type: web
    name: osiris-api
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: osiris-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: osiris-db
    databaseName: osiris
    user: osiris