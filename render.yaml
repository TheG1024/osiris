# Render Blueprint for Osiris Redux
# Deploy at: https://render.com/select-repo

services:
  # PostgreSQL with TimescaleDB extension
  - type: pserv
    name: osiris-db
    databaseUrl: ${DATABASE_URL}
    ipAllowList: []
    
  # API Gateway (Express + WebSocket)
  - type: web
    name: osiris-api
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile.api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: osiris-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REDPANDA_BROKERS
        sync: false
    
  # AI Engine (Python FastAPI)
  - type: web
    name: osiris-ai
    env: docker
    region: oregon
    plan: starter
    dockerContext: ./services/ai-engine
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: osiris-db
          property: connectionString

databases:
  - name: osiris-db
    databaseName: osiris
    user: osiris
    initSqlPath: ./infra/init-db.sql