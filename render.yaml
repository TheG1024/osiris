# Render Blueprint for Osiris Redux
# Deploy at: https://render.com/select-repo
#
# ponytail: ingestion services run as background workers (type: worker).
# No HTTP, no port. They loop forever, fetch from upstream APIs, upsert
# into osiris-db. Health comes from log lines, not /healthz.

services:
  # Web Frontend (Next.js)
  - type: web
    name: osiris-web
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile.web
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://osiris-api.onrender.com
      - key: NODE_ENV
        value: production

  # API Gateway (Express + WebSocket)
  - type: web
    name: osiris-api
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: osiris-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # Background: aircraft ingestion (OpenSky, public, no key)
  - type: worker
    name: osiris-ingest-aircraft
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile.ingest
    dockerContext: .
    envVars:
      - key: SERVICE
        value: ingest-aircraft
      - key: DATABASE_URL
        fromDatabase:
          name: osiris-db
          property: connectionString
      - key: BBOX
        value: "35,-15,70,40"   # Europe; change to scope your region

  # Background: satellite ingestion (CelesTrak, public, no key)
  - type: worker
    name: osiris-ingest-satellite
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile.ingest
    dockerContext: .
    envVars:
      - key: SERVICE
        value: ingest-satellite
      - key: DATABASE_URL
        fromDatabase:
          name: osiris-db
          property: connectionString
      - key: CATEGORY
        value: "stations"
      - key: SAT_LIMIT
        value: "200"

  # Background: weather ingestion (NOAA METAR, public, no key)
  - type: worker
    name: osiris-ingest-weather
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile.ingest
    dockerContext: .
    envVars:
      - key: SERVICE
        value: ingest-weather
      - key: DATABASE_URL
        fromDatabase:
          name: osiris-db
          property: connectionString
      # NOAA rejects "give me everything"; pass a station list or bbox.
      - key: STATIONS
        value: "KJFK,KLAX,KORD,KATL,KDEN,KDFW,KSFO,KSEA,KIAH,KBOS,KEWR,KPHL,KPHX,KLAS,KMIA,KFLL,KMSP,KMCO,KDTW,KCLT,KLGA,KBWI,KIAD,KSLC,KSAN,EGLL,EGKK,LFML,LFPG,LFMN,EHAM,EDDF,EDDM,RJTT,RJAA,RJBB,ZSPD,ZGGG,ZBAA,VHHH,RCTP,WSSS,OMDB,VIDP,VABB,YSSY"
      - key: STATION_LIMIT
        value: "200"

databases:
  - name: osiris-db
  # Render Postgres Starter supports PostGIS. We don't need TimescaleDB
  # in production; entity_positions is a plain indexed table.
  plan: starter
  databaseName: osiris
  user: osiris