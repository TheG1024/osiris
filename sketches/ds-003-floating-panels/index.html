<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSIRIS - Floating Toolbar (Design System)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --accent-green: #00ff41;
      --accent-green-dim: #00ff4133;
      --accent-cyan: #00d4ff;
      --accent-orange: #ff6b00;
      --accent-magenta: #ff00ff;
      --accent-red: #ff3333;
      --accent-yellow: #ffff00;
      --border-color: #1a3a1a;
    }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg-primary);
      color: var(--accent-green);
    }
    .font-display { font-family: 'Orbitron', sans-serif; }
    .phosphor { text-shadow: 0 0 10px var(--accent-green), 0 0 20px var(--accent-green); }
    .scan-lines {
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.03) 2px, rgba(0,255,65,0.03) 4px);
    }
    .entity-marker {
      width: 12px;
      height: 12px;
      transform: rotate(45deg);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .entity-marker:hover { transform: rotate(45deg) scale(1.8); }
    .entity-marker.aircraft { background: var(--accent-cyan); box-shadow: 0 0 15px var(--accent-cyan); }
    .entity-marker.ship { background: var(--accent-orange); box-shadow: 0 0 15px var(--accent-orange); }
    .entity-marker.satellite { background: var(--accent-magenta); box-shadow: 0 0 15px var(--accent-magenta); }
    .entity-marker.fire { background: var(--accent-red); box-shadow: 0 0 15px var(--accent-red); }
    .entity-marker.earthquake { background: var(--accent-yellow); box-shadow: 0 0 15px var(--accent-yellow); }
    .btn-hud {
      border: 1px solid var(--accent-green);
      background: rgba(0,0,0,0.8);
      color: var(--accent-green);
      transition: all 0.2s;
      cursor: pointer;
    }
    .btn-hud:hover { background: var(--accent-green); color: var(--bg-primary); }
    .btn-hud.active { background: var(--accent-green); color: var(--bg-primary); }
    .blink { animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.3; } }
    .grid-overlay {
      background-image: linear-gradient(var(--accent-green-dim) 1px, transparent 1px), linear-gradient(90deg, var(--accent-green-dim) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .float-panel {
      background: rgba(10, 10, 10, 0.95);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(10px);
    }
    input:focus { outline: none; border-color: var(--accent-green); }
  </style>
</head>
<body class="h-screen overflow-hidden scan-lines">
  <!-- FLOATING HEADER -->
  <header class="absolute top-0 left-0 right-0 z-50 p-3">
    <div class="float-panel rounded flex items-center px-4 py-2 gap-4">
      <h1 class="font-display text-lg font-bold tracking-widest phosphor">OSIRIS</h1>
      <span class="text-xs text-[#00ff41]/60">● LIVE</span>
      <span class="flex-1"></span>
      <span class="text-sm"><span class="text-[#00ff41]/60">123</span> entities</span>
      <span class="font-mono text-xs">18:44 UTC</span>
    </div>
  </header>

  <!-- FULL MAP -->
  <main class="h-screen relative bg-[#050a05]">
    <div class="absolute inset-0 flex items-center justify-center">
      <div class="relative w-full h-full max-w-4xl max-h-[600px]">
        <div class="absolute inset-0 opacity-20 grid-overlay"></div>
        <div class="entity-marker aircraft" style="top: 20%; left: 30%;"></div>
        <div class="entity-marker aircraft" style="top: 25%; left: 35%;"></div>
        <div class="entity-marker aircraft" style="top: 30%; left: 40%;"></div>
        <div class="entity-marker ship" style="top: 60%; left: 20%;"></div>
        <div class="entity-marker ship" style="top: 55%; left: 25%;"></div>
        <div class="entity-marker satellite" style="top: 15%; left: 60%;"></div>
        <div class="entity-marker satellite" style="top: 20%; left: 65%;"></div>
        <div class="entity-marker fire" style="top: 70%; left: 70%;"></div>
        <div class="entity-marker earthquake" style="top: 50%; left: 50%;"></div>
      </div>
    </div>

    <!-- FLOATING SIDEBAR - RIGHT -->
    <aside class="absolute top-20 right-4 w-56 flex flex-col gap-2">
      <div class="float-panel rounded p-3">
        <input type="text" placeholder="Search..." 
          class="w-full bg-black border border-[#1a3a1a] px-2 py-1.5 text-xs text-[#00ff41] placeholder-[#00ff41]/30 focus:border-[#00ff41]">
      </div>
      <div class="float-panel rounded p-2 flex flex-wrap gap-1">
        <button class="btn-hud active px-2 py-1 text-[10px]">ALL</button>
        <button class="btn-hud px-2 py-1 text-[10px]">AIR</button>
        <button class="btn-hud px-2 py-1 text-[10px]">SEA</button>
        <button class="btn-hud px-2 py-1 text-[10px]">SATS</button>
      </div>
    </aside>

    <!-- FLOATING STATS - LEFT -->
    <aside class="absolute top-20 left-4 w-48 flex flex-col gap-2">
      <div class="float-panel rounded p-3">
        <div class="font-display text-[10px] tracking-widest text-[#00ff41]/70 mb-2">STATS</div>
        <div class="text-xs space-y-1">
          <div class="flex justify-between"><span class="text-[#00ff41]/60">FLIGHTS</span><span class="text-[#00d4ff]">50</span></div>
          <div class="flex justify-between"><span class="text-[#00ff41]/60">SHIPS</span><span class="text-[#ff6b00]">30</span></div>
          <div class="flex justify-between"><span class="text-[#00ff41]/60">SATS</span><span class="text-[#ff00ff]">20</span></div>
          <div class="flex justify-between"><span class="text-[#00ff41]/60">EVENTS</span><span class="text-[#ff3333]">23</span></div>
        </div>
      </div>
      <div class="float-panel rounded p-3">
        <div class="font-display text-[10px] tracking-widest text-[#00ff41]/70 mb-2">INTEL</div>
        <div class="text-[10px] space-y-1">
          <div class="border border-[#1a3a1a] p-1">
            <span class="text-[#00d4ff]">EK7007</span>
          </div>
          <div class="border border-red-900/50 bg-red-900/10 p-1">
            <span class="text-red-500">⚠ OFAC</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- MAP CONTROLS - BOTTOM RIGHT -->
    <div class="absolute bottom-4 right-4 flex flex-col gap-1">
      <button class="btn-hud w-8 h-8 text-lg">+</button>
      <button class="btn-hud w-8 h-8 text-lg">−</button>
      <button class="btn-hud px-2 py-1 text-xs">RESET</button>
    </div>

    <!-- SCALE - BOTTOM LEFT -->
    <div class="absolute bottom-4 left-4 text-xs text-[#00ff41]/60">
      2000km
    </div>
  </main>
</body>
</html>
