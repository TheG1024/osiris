<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSIRIS - Tactical HUD (Design System)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- DESIGN SYSTEM TOKENS -->
  <style>
    :root {
      /* Primary Colors */
      --bg-primary: #0a0a0a;
      --bg-secondary: #0d1a0d;
      --accent-green: #00ff41;
      --accent-green-dim: #00ff4133;
      --accent-green-muted: #00ff4180;
      --accent-cyan: #00d4ff;
      --accent-orange: #ff6b00;
      --accent-magenta: #ff00ff;
      --accent-red: #ff3333;
      --accent-yellow: #ffff00;
      --text-primary: #00ff41;
      --text-muted: #00ff4180;
      --border-color: #1a3a1a;
    }
    
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg-primary);
      color: var(--accent-green);
    }
    
    .font-display { font-family: 'Orbitron', sans-serif; }
    
    /* Phosphor glow effect */
    .phosphor {
      text-shadow: 0 0 10px var(--accent-green), 0 0 20px var(--accent-green);
    }
    
    /* Panel styling */
    .hud-panel {
      background: linear-gradient(180deg, rgba(0,20,0,0.9) 0%, rgba(0,10,0,0.95) 100%);
      border: 1px solid var(--border-color);
    }
    
    /* Scan lines */
    .scan-lines {
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.03) 2px, rgba(0,255,65,0.03) 4px);
    }
    
    /* Corner brackets */
    .corner-bracket { position: relative; }
    .corner-bracket::before, .corner-bracket::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid var(--accent-green);
    }
    .corner-bracket::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
    .corner-bracket::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }
    
    /* Entity markers */
    .entity-marker {
      width: 12px;
      height: 12px;
      transform: rotate(45deg);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .entity-marker:hover {
      transform: rotate(45deg) scale(1.8);
    }
    .entity-marker.aircraft { background: var(--accent-cyan); box-shadow: 0 0 15px var(--accent-cyan); }
    .entity-marker.ship { background: var(--accent-orange); box-shadow: 0 0 15px var(--accent-orange); }
    .entity-marker.satellite { background: var(--accent-magenta); box-shadow: 0 0 15px var(--accent-magenta); }
    .entity-marker.fire { background: var(--accent-red); box-shadow: 0 0 15px var(--accent-red); }
    .entity-marker.earthquake { background: var(--accent-yellow); box-shadow: 0 0 15px var(--accent-yellow); }
    
    /* Buttons - NO rounded corners > 4px */
    .btn-hud {
      border: 1px solid var(--accent-green);
      background: transparent;
      color: var(--accent-green);
      transition: all 0.2s;
      cursor: pointer;
    }
    .btn-hud:hover {
      background: var(--accent-green);
      color: var(--bg-primary);
    }
    .btn-hud.active {
      background: var(--accent-green);
      color: var(--bg-primary);
    }
    
    /* Animations */
    .blink { animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.3; } }
    
    /* Grid overlay */
    .grid-overlay {
      background-image: linear-gradient(var(--accent-green-dim) 1px, transparent 1px), 
                        linear-gradient(90deg, var(--accent-green-dim) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    
    /* Input focus */
    input:focus {
      outline: none;
      border-color: var(--accent-green);
    }
  </style>
</head>
<body class="h-screen overflow-hidden scan-lines">
  <!-- HEADER -->
  <header class="h-16 border-b border-[#1a3a1a] flex items-center justify-between px-6 bg-black/90">
    <div class="flex items-center gap-4">
      <h1 class="font-display text-2xl font-bold tracking-widest phosphor">OSIRIS</h1>
      <span class="text-xs text-[#00ff41]/60">● REDUX</span>
      <span class="text-xs blink">● LIVE</span>
    </div>
    <div class="flex items-center gap-4">
      <span class="text-sm"><span class="text-[#00ff41]/60">ENTITIES:</span> 123</span>
      <span class="text-sm"><span class="text-[#00ff41]/60">TLE:</span> ACTIVE</span>
      <span class="text-xs font-mono">18:44:34 UTC</span>
    </div>
    <div class="flex gap-2">
      <button class="btn-hud px-3 py-1 text-xs">⛶ FULLSCREEN</button>
      <button class="btn-hud px-3 py-1 text-xs">⚙ SETTINGS</button>
      <button class="btn-hud px-3 py-1 text-xs">? HELP</button>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="flex h-[calc(100vh-64px)]">
    
    <!-- SIDEBAR -->
    <aside class="w-64 border-r border-[#1a3a1a] p-4 bg-black/50 flex flex-col gap-4">
      
      <!-- Search Panel -->
      <div class="hud-panel p-4 corner-bracket">
        <h3 class="font-display text-xs tracking-widest mb-3 text-[#00ff41]/70">INTELLIGENCE SEARCH</h3>
        <input type="text" placeholder="Search flights, ships, satellites..." 
          class="w-full bg-black border border-[#1a3a1a] px-3 py-2 text-sm focus:border-[#00ff41] text-[#00ff41] placeholder-[#00ff41]/30">
      </div>
      
      <!-- Filters -->
      <div class="flex flex-wrap gap-1">
        <button class="btn-hud active px-2 py-1 text-xs">ALL</button>
        <button class="btn-hud px-2 py-1 text-xs">AIRCRAFT</button>
        <button class="btn-hud px-2 py-1 text-xs">MARITIME</button>
        <button class="btn-hud px-2 py-1 text-xs">SATELLITES</button>
        <button class="btn-hud px-2 py-1 text-xs">ALERTS</button>
      </div>

      <!-- Statistics Panel -->
      <div class="hud-panel p-4 flex-1">
        <h3 class="font-display text-xs tracking-widest mb-3 text-[#00ff41]/70">STATISTICS</h3>
        <div class="space-y-2 text-xs">
          <div class="flex justify-between"><span class="text-[#00ff41]/60">FLIGHTS</span><span class="text-[#00d4ff]">50</span></div>
          <div class="flex justify-between"><span class="text-[#00ff41]/60">SHIPS</span><span class="text-[#ff6b00]">30</span></div>
          <div class="flex justify-between"><span class="text-[#00ff41]/60">SATELLITES</span><span class="text-[#ff00ff]">20</span></div>
          <div class="flex justify-between"><span class="text-[#00ff41]/60">FIRES</span><span class="text-[#ff3333]">15</span></div>
          <div class="flex justify-between"><span class="text-[#00ff41]/60">EARTHQUAKES</span><span class="text-[#ffff00]">8</span></div>
        </div>
      </div>

      <!-- Intel Panel -->
      <div class="hud-panel p-4 flex-1">
        <h3 class="font-display text-xs tracking-widest mb-3 text-[#00ff41]/70">INTELLIGENCE</h3>
        <div class="text-xs space-y-2">
          <div class="border border-[#1a3a1a] p-2">
            <div class="text-[#00ff41]/60">AIRCRAFT</div>
            <div class="font-display">EK7007</div>
            <div class="text-[#00ff41]/50 text-[10px]">Boeing 737-800</div>
          </div>
          <div class="border border-red-900/50 bg-red-900/10 p-2">
            <div class="text-red-500">⚠ OFAC MATCH</div>
            <div class="text-[#00ff41]/50 text-[10px]">SDN List</div>
          </div>
          <div class="border border-[#1a3a1a] p-2">
            <div class="text-[#00ff41]/60">DATABASE</div>
            <div class="">19,778 entries</div>
            <div class="text-[#00ff41]/50 text-[10px]">OFAC + EU + UN</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- MAP AREA -->
    <main class="flex-1 relative bg-[#050a05]">
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="relative w-full h-full max-w-4xl max-h-[600px]">
          <div class="absolute inset-0 opacity-20 grid-overlay"></div>
          
          <!-- Entity markers following design system colors -->
          <div class="entity-marker aircraft" style="top: 20%; left: 30%;"></div>
          <div class="entity-marker aircraft" style="top: 25%; left: 35%;"></div>
          <div class="entity-marker aircraft" style="top: 30%; left: 40%;"></div>
          <div class="entity-marker ship" style="top: 60%; left: 20%;"></div>
          <div class="entity-marker ship" style="top: 65%; left: 25%;"></div>
          <div class="entity-marker satellite" style="top: 15%; left: 60%;"></div>
          <div class="entity-marker satellite" style="top: 20%; left: 65%;"></div>
          <div class="entity-marker fire" style="top: 70%; left: 70%;"></div>
          <div class="entity-marker earthquake" style="top: 50%; left: 50%;"></div>
        </div>
      </div>
      
      <!-- Map Controls -->
      <div class="absolute bottom-4 right-4 flex flex-col gap-2">
        <button class="btn-hud px-3 py-2 text-lg">+</button>
        <button class="btn-hud px-3 py-2 text-lg">−</button>
        <button class="btn-hud px-3 py-2 text-xs mt-2">⟲ RESET</button>
      </div>
      
      <!-- Scale -->
      <div class="absolute bottom-4 left-4 text-xs text-[#00ff41]/60">
        <span>2000km</span>
      </div>
    </main>
  </div>
</body>
</html>
